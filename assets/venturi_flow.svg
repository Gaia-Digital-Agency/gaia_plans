<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520"
     role="img"
     aria-label="The Venturi — turbulent client demand compressed by AI stack and talent pool into laminar high-velocity output">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0B3B66"/>
    </marker>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#070201" stroke-width="0.9"/>
    </pattern>
  </defs>

  <!-- Parchment background -->
  <rect width="1200" height="520" fill="#FAF6E6"/>

  <!-- ─── Top labels ─────────────────────────────────── -->
  <text x="210" y="40" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#070201" text-anchor="middle">Complex Market Needs</text>
  <text x="600" y="34" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0B5394" text-anchor="middle">Compression via AI</text>
  <text x="600" y="52" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0B5394" text-anchor="middle">Stack &amp; Talent Pool</text>
  <text x="960" y="40" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#070201" text-anchor="middle">High-Velocity Output</text>

  <!-- Bracket lines for top labels -->
  <g stroke="#070201" stroke-width="1" fill="none">
    <path d="M 30 58 L 30 72 L 400 72 L 400 58"/>
    <path d="M 490 58 L 490 72 L 710 72 L 710 58"/>
    <path d="M 800 58 L 800 72 L 1170 72 L 1170 58"/>
  </g>

  <!-- ─── Pipe structure ──────────────────────────────── -->
  <!-- Left wide chamber — hatched walls (outer trapezoid minus inner trapezoid) -->
  <path d="M 20 80  L 400 80  L 490 210 L 490 310 L 400 440 L 20 440 Z
           M 40 100 L 380 100 L 470 220 L 470 300 L 380 420 L 40 420 Z"
        fill="url(#hatch)" fill-rule="evenodd" stroke="#070201" stroke-width="2"/>

  <!-- Left-to-throat transition (external connector flange top and bottom) -->
  <rect x="385" y="70" width="20" height="14" fill="url(#hatch)" stroke="#070201" stroke-width="1.5"/>
  <rect x="385" y="436" width="20" height="14" fill="url(#hatch)" stroke="#070201" stroke-width="1.5"/>

  <!-- Central throat — narrow compressed chamber -->
  <path d="M 490 210 L 710 210 L 710 310 L 490 310 Z
           M 505 225 L 695 225 L 695 295 L 505 295 Z"
        fill="url(#hatch)" fill-rule="evenodd" stroke="#070201" stroke-width="2"/>

  <!-- Right-of-throat flange -->
  <rect x="795" y="70" width="20" height="14" fill="url(#hatch)" stroke="#070201" stroke-width="1.5"/>
  <rect x="795" y="436" width="20" height="14" fill="url(#hatch)" stroke="#070201" stroke-width="1.5"/>

  <!-- Right wide chamber — mirror of left -->
  <path d="M 710 210 L 800 80  L 1180 80  L 1180 440 L 800 440 L 710 310 Z
           M 730 220 L 820 100 L 1160 100 L 1160 420 L 820 420 L 730 300 Z"
        fill="url(#hatch)" fill-rule="evenodd" stroke="#070201" stroke-width="2"/>

  <!-- ─── LEFT: Turbulent curved lines ───────────────────────────── -->
  <g stroke="#0B3B66" stroke-width="1.1" fill="none" stroke-linecap="round">
    <path d="M 50 120 C 130 150, 180 100, 240 160 S 310 130, 360 220 S 430 260, 470 260"/>
    <path d="M 50 160 C 140 130, 200 190, 250 150 S 330 250, 400 240 L 470 260"/>
    <path d="M 55 200 C 130 230, 190 170, 260 230 S 340 200, 400 250 L 470 260"/>
    <path d="M 50 230 C 170 200, 230 270, 290 210 S 380 280, 440 260 L 470 260"/>
    <path d="M 50 260 C 140 290, 210 230, 290 290 S 380 250, 460 270"/>
    <path d="M 50 290 C 160 260, 230 340, 310 290 S 400 280, 470 270"/>
    <path d="M 50 320 C 130 360, 210 300, 280 360 S 360 290, 440 270 L 470 260"/>
    <path d="M 50 360 C 150 330, 240 390, 300 330 S 390 310, 470 270"/>
    <path d="M 50 400 C 170 360, 260 410, 320 360 S 400 320, 470 270"/>
  </g>

  <!-- ─── CENTER: 5 gold cubes + connecting arrows ────────────── -->
  <g>
    <!-- Cubes -->
    <g fill="#E8B830" stroke="#070201" stroke-width="1.4">
      <rect x="535" y="240" width="22" height="22" rx="2"/>
      <rect x="535" y="278" width="22" height="22" rx="2"/>
      <rect x="590" y="259" width="22" height="22" rx="2"/>
      <rect x="645" y="240" width="22" height="22" rx="2"/>
      <rect x="645" y="278" width="22" height="22" rx="2"/>
    </g>
    <!-- Arrows between cubes -->
    <g stroke="#0B3B66" stroke-width="1.3" fill="none" marker-end="url(#arrowhead)">
      <line x1="557" y1="251" x2="590" y2="267"/>
      <line x1="557" y1="289" x2="590" y2="273"/>
      <line x1="612" y1="267" x2="645" y2="251"/>
      <line x1="612" y1="273" x2="645" y2="289"/>
      <line x1="557" y1="251" x2="645" y2="251"/>
      <line x1="557" y1="289" x2="645" y2="289"/>
    </g>
  </g>

  <!-- ─── RIGHT: Straight laminar arrows ──────────────────────── -->
  <g stroke="#0B3B66" stroke-width="1.3" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)">
    <line x1="720" y1="125" x2="1150" y2="105"/>
    <line x1="720" y1="155" x2="1150" y2="145"/>
    <line x1="720" y1="185" x2="1150" y2="185"/>
    <line x1="720" y1="215" x2="1150" y2="225"/>
    <line x1="720" y1="245" x2="1150" y2="265"/>
    <line x1="720" y1="275" x2="1150" y2="305"/>
    <line x1="720" y1="305" x2="1150" y2="345"/>
    <line x1="720" y1="335" x2="1150" y2="385"/>
    <line x1="720" y1="395" x2="1150" y2="415"/>
  </g>

  <!-- ─── Bottom callouts with stems ─────────────────────────── -->
  <!-- Left bottom -->
  <g stroke="#070201" stroke-width="1" fill="none">
    <path d="M 210 450 L 210 465 L 30 465 L 30 445"/>
    <path d="M 210 450 L 210 465 L 400 465 L 400 445"/>
  </g>
  <text x="210" y="487" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" fill="#070201" text-anchor="middle">Chaotic client demands</text>
  <text x="210" y="503" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" fill="#070201" text-anchor="middle">from Bali Hospitality &amp; F&amp;B</text>

  <!-- Center bottom — two callouts (VRTN stack + talent pool) -->
  <g stroke="#070201" stroke-width="1" fill="none">
    <path d="M 545 450 L 545 458 L 490 458 L 490 445"/>
    <path d="M 545 450 L 545 458 L 600 458 L 600 320"/>
    <path d="M 660 450 L 660 458 L 600 458 L 600 320"/>
    <path d="M 660 450 L 660 458 L 710 458 L 710 445"/>
  </g>
  <text x="545" y="479" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#070201" text-anchor="middle">Proprietary</text>
  <text x="545" y="494" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#070201" text-anchor="middle">VRTN Stack</text>
  <text x="660" y="479" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#070201" text-anchor="middle">Fixed 25-Person</text>
  <text x="660" y="494" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#070201" text-anchor="middle">Talent Pool</text>

  <!-- Right bottom — output bullets -->
  <text x="820" y="478" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#070201">• Elite-Standard Digital Assets</text>
  <text x="820" y="494" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#070201">• Autonomous Guest Ecosystems</text>
  <text x="820" y="510" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#070201">• Operational Alpha</text>
</svg>
